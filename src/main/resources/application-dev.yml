
server:
  port: 9091
  servlet:
    context-path: /mis-productos
---

spring:
  codec:
    max-in-memory-size: 10MB
  cache:
    #type: redis
    type: simple
  redis:
    host: 127.0.0.1
    port: 6379
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:mysql://localhost:3306/inventario_key
#    url: jdbc:mysql://db-bolsas-key.cuf6ai4u4jfs.us-east-1.rds.amazonaws.com:3306/inventario_key
#    url: ${SPRING_DATASOURCE_URL}
#    username: ${SPRING_DATASOURCE_USERNAME}
#    username: admin
    username: root
#    password: ${SPRING_DATASOURCE_PASSWORD}
#    password: tpM9EBgFzQ![<NTfvJu2g$6S9Ele
    password: 130594
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      idle-timeout: 60000         # 1 min: libera conexiones idle rápido en VPS con poca RAM
      max-lifetime: 300000        # 5 min: rota conexiones antes de que MySQL las corte
      connection-timeout: 20000   # 20 seg: tiempo máximo esperando una conexión del pool
      keepalive-time: 30000       # 30 seg: ping para mantener la conexión viva
      connection-test-query: SELECT 1
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

clave-seguridad:
  clave: miClaveSuperSeguraDe32Caracteres

cookie:
  secure: false  # true en producción (requiere HTTPS)

api:
