
server:
  port: 9091
  servlet:
    context-path: /mis-productos

---

spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:mysql://${db-host}:3306/${db-name}
    username: ${db-username}
    password: ${db-password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  cache:
    type: simple

clave-seguridad:
  clave: ${token-jwt}

api:
  imagenes: ${ENDPOINT_IMAGENES}
