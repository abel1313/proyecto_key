
server:
  port: 9010
  servlet:
    context-path: /mis-productos

---

spring:
  codec:
    max-in-memory-size: 10MB
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:mysql://${DB_HOST}:3306/${SPRING_DB_NAME}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: none
  cache:
    type: redis
  redis:
    host: redis
    port: 6379
clave-seguridad:
  clave: ${TOKEN_JWT}

api:
  imagenes: ${ENDPOINT_IMAGENES}
  cors_angular: https://shop.novedades-jade.com.mx

guardar-imagenes:
  ruta_imagenes: /app/imagenes
