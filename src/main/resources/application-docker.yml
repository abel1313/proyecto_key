#    org.hibernate.SQL: DEBUG
#    org.hibernate.orm.jdbc.bind: TRACE

#logging:
#  level:
#    root: INFO
#    com.miempresa: DEBUG

redis:
  dns: redis

mercadopago:
  access-token: ${ACCESS_TOKE_MERCADO_PAGO}
  device-id: ${DEVICE_ID}
  sandbox: false



