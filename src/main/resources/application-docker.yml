spring:
  cache:
    type: simple

server:
  port: 9091
  servlet:
    context-path: /mis-productos
---

spring:
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect


---

spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:mysql://${db-host}:3306/${db-name}
    username: ${db-username}
    password: ${db-password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

clave-seguridad:
  clave: ${toke-jwt}

api:
  imagenes: ${endpoint}/mis-productos
#logging:
#  level:
#    org.hibernate.SQL: DEBUG
#    org.hibernate.orm.jdbc.bind: TRACE

logging:
  level:
    root: INFO
    com.miempresa: DEBUG

---

spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:mysql://${db-host}:3306/${db-name}
    username: ${db-username}
    password: ${db-password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: false
logging:
  level:
    org.hibernate.SQL: INFO
    org.hibernate.orm.jdbc.bind: INFO


clave-seguridad:
  clave: ${toke-jwt}
  
