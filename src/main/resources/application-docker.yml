
server:
  port: 9010
  servlet:
    context-path: /mis-productos

---

spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:mysql://${DB_HOST}:3306/${SPRING_DB_NAME}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  cache:
    type: simple

clave-seguridad:
  clave: ${TOKEN_JWT}

api:
  imagenes: ${ENDPOINT_IMAGENES}
